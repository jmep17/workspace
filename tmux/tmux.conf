# Hand-rolled tmux config — no plugin manager, everything explicit.
# Bootstrap: ln -s ~/src/workspace/tmux ~/.config/tmux
# tmux reads ~/.config/tmux/tmux.conf natively (tmux ≥ 3.1).

# ── Terminal ─────────────────────────────────────────────────────────
# Truecolor to match nvim's termguicolors; Ghostty advertises xterm-ghostty.
set -g default-terminal "tmux-256color"
set -ga terminal-features ",xterm-ghostty:RGB,xterm-256color:RGB"

set -s escape-time 10          # no delay after Esc (nvim mode switches)
set -g focus-events on         # nvim autoread / gitsigns need these
set -g history-limit 50000
set -s set-clipboard on        # OSC 52 passthrough (Ghostty supports it)

# ── Prefix ───────────────────────────────────────────────────────────
# C-a over the default C-b; hit C-a a to send a literal C-a through.
unbind C-b
set -g prefix C-a
bind a send-prefix

# ── Windows & panes ──────────────────────────────────────────────────
set -g base-index 1            # windows and panes count from 1,
set -g pane-base-index 1       # matching the keyboard row
set -g renumber-windows on     # no gaps after closing a window
set -g mouse on

set -g set-titles on
set -g set-titles-string "#S · #W"
setw -g automatic-rename on

# Splits: | and - are the shapes they make; new panes keep the cwd.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Vim-style pane movement and (repeatable) resizing.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Quick actions
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"
bind -r Tab last-window

# ── Copy mode ────────────────────────────────────────────────────────
# Vi keys; v/y mirror visual-mode select/yank in nvim.
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ── Status line (gruvbox dark, matching the nvim default theme) ─────
set -g status-position bottom
set -g status-interval 5
set -g status-style "fg=#ebdbb2,bg=#3c3836"

set -g status-left-length 30
set -g status-left "#[fg=#282828,bg=#a89984,bold] #S #[fg=#a89984,bg=#3c3836] "
set -g status-right "#[fg=#928374]%a %d %b #[fg=#ebdbb2,bold]%H:%M "

setw -g window-status-format "#[fg=#a89984] #I:#W "
setw -g window-status-current-format "#[fg=#fabd2f,bg=#504945,bold] #I:#W "
setw -g window-status-activity-style "fg=#fb4934"

set -g pane-border-style "fg=#504945"
set -g pane-active-border-style "fg=#a89984"
set -g message-style "fg=#ebdbb2,bg=#504945"
setw -g mode-style "fg=#282828,bg=#d79921"
